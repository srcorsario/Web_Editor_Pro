<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADMIN CARTA V 13.0 - WINE SYNC</title>
    <link rel="icon" type="image/png" href="setting.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
    <div class="header-admin">
        <h1>⚙️ GESTOR DE CARTA V 13.0</h1>
        <div id="status-carga">Cargando datos...</div>
        
        <!-- Panel de API Keys -->
        <div class="api-keys-manager">
            <label class="label-seccion" style="margin-bottom: 5px;">🔑 Claves API Gemini (Local)</label>
            <div class="api-keys-inputs">
                <input type="text" id="nuevaKey" placeholder="Pegar nueva API Key..." class="input-estandar">
                <button class="btn-add-key" onclick="agregarKey()">Añadir</button>
            </div>
            <div class="api-keys-list">
                <select id="selectKeys" class="select-keys" disabled>
                    <option value="">No hay Keys configuradas</option>
                </select>
                <button class="btn-delete-key" onclick="eliminarKeySeleccionada()" title="Eliminar Key seleccionada">✕</button>
            </div>
        </div>
    </div>
    <div id="editor-dinamico"></div>
</div>

<button class="btn-add-float" onclick="abrirSelector()">+</button>
<button class="btn-guardar-main" onclick="enviarAlExcel()">💾 GUARDAR Y REORDENAR EXCEL</button>

<div id="modal-editor" class="modal">
    <div class="modal-content modal-full-layout">
        <div class="modal-col-izquierda">
            <h2 id="modal-titulo" style="margin-top:0; color:var(--primario); border-bottom: 2px solid #eee; padding-bottom: 10px;">Editar Elemento</h2>
            <div class="input-group">
                <label id="label-uvas" class="label-seccion">Nombres y Detalles del Plato</label>
                <div class="input-row-lang row-es-control">
                    <div class="lang-tag tag-es-main">ES</div>
                    <div style="flex:1">
                        <input id="edit-es" class="input-estandar input-nombre-corto" placeholder="Nombre en Español" oninput="comprobarRequisitosTraduccion()">
                        <input id="edit-es-uvas" class="input-estandar input-uvas" placeholder="Uvas / Detalles (Opcional)">
                    </div>
                </div>
                <div class="input-row-lang row-en-control">
                    <div class="lang-tag tag-en-main">EN</div>
                    <div style="flex:1">
                        <input id="edit-en" class="input-estandar input-nombre-corto" placeholder="Name in English" oninput="comprobarRequisitosTraduccion()">
                        <input id="edit-en-uvas" class="input-estandar input-uvas" placeholder="Grapes / Details (Optional)">
                    </div>
                </div>
                <button id="btn-generar-en" class="btn-traducir-en" onclick="generarTraduccionEN()">🇬🇧 Generar Inglés desde Español</button>
                <button id="btn-autotraducir" class="btn-traductor-magico" disabled onclick="ejecutarTraduccionAutomatica()">
                    ✨ Traducir los otros 19 idiomas (Requiere ES y EN)
                </button>
                <div id="contenedor-resto-idiomas" class="langs-scroll-container"></div>
            </div>
        </div>

        <div class="modal-col-derecha">
            <div class="panel-control-precio">
                <div class="input-group input-precio-super-mini">
                    <label class="label-seccion">Precio (€)</label>
                    <input type="text" id="edit-precio" class="input-estandar input-precio-mini" placeholder="0.00" oninput="validarFormatoPrecio(this)">
                </div>
                <div class="input-group input-imagen-flexible">
                    <label class="label-seccion">Imagen</label>
                    <input type="text" id="edit-imagen" class="input-estandar" placeholder="plato01.webp">
                </div>
            </div>
            
            <div class="input-group">
                <label class="label-seccion">Alérgenos y Dietas</label>
                <div id="alergenos-grid" class="alergenos-grid"></div>
            </div>
            
            <div class="modal-acciones-footer">
                <button onclick="aplicarCambiosPlato()" class="btn-modal-aceptar">ACEPTAR</button>
                <button onclick="cerrarModal('modal-editor')" class="btn-modal-cancelar">CANCELAR</button>
            </div>
        </div>
    </div>
</div>

<!-- Nuevo Modal para elegir la traducción al Inglés -->
<div id="modal-traduccion-en" class="modal">
    <div class="modal-content" style="max-width: 600px;">
        <h3 style="text-align:center; color:var(--primario); margin-top:0;">Generar Traducción al Inglés</h3>
        <p style="font-size: 0.85rem; text-align:center; color:#7f8c8d;">Selecciona una versión o edítala a tu gusto</p>
        
        <div id="opciones-en-container" style="margin: 15px 0;"></div>
        
        <div style="margin-top: 15px;">
            <label class="label-seccion">Editar selección:</label>
            <textarea id="editar-opcion-en" class="input-estandar" rows="3" placeholder="Selecciona una opción arriba o escribe la tuya..."></textarea>
        </div>
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button onclick="confirmarTraduccionEN()" class="btn-modal-aceptar" style="flex:1;">CONFIRMAR</button>
            <button onclick="cerrarModalTraduccionEN()" class="btn-modal-cancelar" style="flex:1;">CANCELAR</button>
        </div>
    </div>
</div>

<div id="modal-selector" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <h3 style="text-align:center; color:var(--primario);">AÑADIR NUEVO A...</h3>
        <div id="lista-agrupada" style="max-height: 65vh; overflow-y: auto;"></div>
        <button onclick="cerrarModal('modal-selector')" style="width:100%; margin-top:15px; padding:15px; border:none; background:#eee; border-radius:10px; font-weight:bold;">CERRAR</button>
    </div>
</div>

<script src="languages.js"></script>
<script src="state.js"></script>
<script src="ui.js"></script>
<script src="app.js"></script>

<script>
    function validarFormatoPrecio(input) {
        let valor = input.value.replace(',', '.');
        valor = valor.replace(/[^0-9.]/g, '');
        const partes = valor.split('.');
        if (partes.length > 2) {
            valor = partes[0] + '.' + partes.slice(1).join('');
        }
        const fragmentos = valor.split('.');
        let enteros = fragmentos[0];
        let decimales = fragmentos[1];
        if (enteros.length > 3) {
            enteros = enteros.substring(0, 3);
        }
        if (decimales !== undefined && decimales.length > 2) {
            decimales = decimales.substring(0, 2);
        }
        if (decimales !== undefined) {
            if ((enteros.length + decimales.length) > 5) {
                decimales = decimales.substring(0, 5 - enteros.length);
            }
            input.value = enteros + '.' + decimales;
        } else {
            input.value = enteros;
        }
    }
    window.validarPrecio = validarFormatoPrecio;
</script>

</body>
</html>
